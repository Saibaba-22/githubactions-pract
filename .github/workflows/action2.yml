name: terra2 deployment
on: 
  push:
    branches: [ main ]
permissions: 
  id-token: write
  contents: read
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: gitcheckout
        uses: actions/checkout@v2
      - name: setup Terraform
        uses: hashicorp/setup-terraform-terraform@v2
        with:
          terraform_version: 1.8.5
      - name: AWS access using OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::027903150537:role/OIDCterraformgit
          role-session-name: github-actions
          aws-region: ap-south-1
